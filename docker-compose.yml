services:
  poker-manager:
    build: .
    ports:
      - "${HOST_PORT:-8080}:${PORT:-8080}"
    environment:
      PORT: "${PORT:-8080}"
      DATABASE_URL: "${DATABASE_URL:-sqlite:/data/poker.db?mode=rwc}"
      RUST_LOG: "${RUST_LOG:-info}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin}"
    volumes:
      - poker-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8080}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  poker-data:
